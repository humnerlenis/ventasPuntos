<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Vepagos - Registro de Ventas</title>
    <link rel="stylesheet" href="css/styles.css">
    
   <link rel="stylesheet" href="css/fontawesome-free-7.2.0-web/css/fontawesome.css">
<body>
    <div class="container">
        <header class="header vepagos-bg">
            <div class="logo-container ">
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
                <i class="fas fa-credit-card logo-icon"></i>
                <h1>Vepagos</h1>
            </div>
            <p class="subtitle">Registro de ventas - Recibo</p>
        </header>

        <main>
            <form id="vepagosForm" class="form-container">

                 <!-- Selección de Tipo de Cliente -->
                <div class="form-section">
                    <h3><i class="fas fa-user"></i> Tipo de Cliente</h3>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="tipoCliente" value="natural" > Persona Natural
                        </label>
                        <!--label class="radio-label">
                            <input type="radio" name="tipoCliente" value="firma"> Firma Personal
                        </label-->
                        <label class="radio-label">
                            <input type="radio" name="tipoCliente" value="juridica" checked> Persona Jurídica
                        </label>
                    </div>
                </div>

               

                <!-- Datos Principales -->
                <div class="form-section">
                    <h3><i class="fas fa-building"></i> Datos del Comercio</h3>
                    <div class="form-row">

                        <div class="form-group">
                            <label for="tipoColocacion">Tipo de Colocación</label>
                            <select id="tipoColocacion" name="tipoColocacion" required>
                                <option value="" ></option>
                                <option value="contado" selected>Contado</option>
                                <option value="financiado" selected>Financiado</option>
                                <option value="comodato">Comodato</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Banco</label>
                            <select name="banco" required>
                                <option value=""></option>
                                <option value="venezuela">Venezuela</option>
                                <option value="mercantil">Mercantil</option>
                                <option value="banplus">Banplus</option>
                                <option value="tesoro">Tesoro</option>
                                <option value="fondocomun">Fondo Común</option>
                                <option value="bdt">BDT</option>
                                <option value="plaza">Plaza</option>
                                <option value="activo">Activo</option>
                                <option value="delsur">Del Sur</option>
                                <option value="bancrecer">Bancrecer</option>
                                <option value="r4">R4</option>
                                <option value="100banco">100% Banco</option>
                                <option value="provincial">Provincial</option>
                                <option value="bancaribe">Bancaribe</option>
                                <option value="banesco">Banesco</option>
                            </select>
                        </div>

                        <div class="form-group">
                                <label for="cuentaBancaria">Cuenta Bancaria</label>
                                <input type="text" id="cuentaBancaria" name="cuentaBancaria" placeholder="Número de cuenta" required value="01021423456789123456">
                        </div>

                        <div class="form-group">
                                <label for="codigoAfiliado">Codigo de Afiliado</label>
                                <input type="text" id="codigoAfiliado" name="codigoAfiliado" placeholder="12345678" value="12345678" >
                        </div>



                        <div class="form-group">
                            <label>Código Oficina</label>
                            <input type="text" name="codOficina"  >
                        </div>
                        <div class="form-group">
                            <label for="regional">Regional</label>
                            <input type="text" id="regional" name="regional"  >
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Tipo de RIF</label>
                            <select name="tipoRif" required>
                                <option value="V">V</option>
                                <option value="V">E</option>
                                <option value="J">J</option>
                                <option value="V">G</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Número de RIF</label>
                            <input type="text" name="rif" placeholder="123456789" required value="123456789">
                        </div>
                        <div class="form-group">
                            <label for="razonSocial">Razón Social</label>
                        <input type="text" id="razonSocial" name="razonSocial" placeholder="Nombre de la empresa" required value="Nombre de la empresa">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Actividad Económica</label>
                        <input type="text" name="actividadEconomica" value="Viveres en General" required>
                    </div>

                     <div class="form-row">
                        <div class="form-group">
                            <label for="ciudad">Ciudad</label>
                            <input type="text" id="ciudad" name="ciudad" required>
                        </div>
                        <div class="form-group">
                            <label for="estado">Estado</label>
                            <input type="text" id="estado" name="estado" required>
                        </div>
                    </div>


                    <div class="form-row">
                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="tel" name="telefono" placeholder="0412-1234567" required>
                        </div>
                        <div class="form-group">
                            <label>Correo Electrónico</label>
                            <input type="email" name="correo" placeholder="correo@ejemplo.com" required>
                        </div>
                    </div>


                </div>


                

                <!-- Datos del Representante Legal -->
                <div class="form-section" id="representanteLegalSection">
                    <h3><i class="fas fa-user-tie"></i> Datos del Representante Legal</h3>
                    <div class="form-group">
                            <label for="nombresRepresentante">Nombres y Apellidos</label>
                            <input type="text" id="nombresRepresentante" name="nombresRepresentante" required>
                        </div>
                    

                    <div class="form-row">
                        <div class="form-group">
                            <label for="cedulaRepresentante" >Cédula del Representante Legal</label>
                            <input type="text" id="cedulaRepresentante" name="cedulaRepresentante" placeholder="V-12345678" required>
                        </div>
                               
                    </div>
                </div>

                <!-- Datos del Equipo -->
                <div class="form-section">
                    <h3><i class="fas fa-mobile-alt"></i> Datos del Equipo</h3>
                  <div class="form-row"> 
                        <div class="form-group">
                            <label>Modelo del Equipo</label>
                            
                            <select id="modeloEquipo" name="modeloEquipo" required>
                                <option value="7210">7210</option>
                                <option value="A50">A50</option>
                                <option value="A920">A920</option>
                                <option value="A8900">A8900</option>
                                <option value="T1">T1</option>
                                <option value="6210">6210</option>
                                <option value="8210">8210</option>
                                <option value="9220">9220</option>
                                <option value="Q2">Q2</option>
                                <option value="Q3">Q3</option>
                            </select>
                            
                        </div>
                        
                        <div class="form-group">
                            <label>Serial del Equipo</label>
                            <input type="text" name="serialEquipo" value="9" required>
                        </div>
                        <div class="form-group">
                            <label for="planServicio">Plan de Servicio</label>
                            <select id="planServicio" name="planServicio" required>
                                <option value=""></option>
                                <option value="vx1" selected>Vx1</option>
                                <option value="vx2" >Vx2</option>
                                <option value="vx3">Vx3</option>
                            </select>
                        </div>


                        <div class="form-group">
                            <label>Operadora</label>
                            <select name="operadora" required>
                                <option value="ninguna">Ninguna</option>
                                <option value="digitel">Digitel</option>
                                <option value="movistar">Movistar</option>
                                <option value="movilnet">Movilnet</option>
                            </select>
                        </div>
                    </div> 

                    <div class="form-row">
                        <div class="form-group">
                            <label>Método de Pago</label>
                            <select name="metodoPago" required>
                                <option value="">Seleccione...</option>
                                <option value="efectivo">Efectivo</option>
                                <option value="transferencia">Transferencia</option>
                                <option value="debito">Débito</option>
                                <option value="pago_movil">Pago Móvil</option>
                                <option value="banesco_panama">Banesco Panamá</option>
                                <option value="zelle">Zelle</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Monto</label>
                            <input type="text" name="monto" placeholder="0.00" required>
                        </div>

                    </div>

                    
                </div>

                <!-- Sección Adendum (solo para financiado) -->
                <div class="form-section" id="adendumSection" style="display: none;">
                    <h3><i class="fas fa-file-contract"></i> Adendum Financiamiento</h3>
                    <p>Complete información adicional para financiamiento</p>
                    
                    <div class="form-group">
                        <label>Plazo de Financiamiento (dias)</label>
                        <input type="number" name="plazoFinanciamiento" min="30" max="180" value="90" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Monto Restante</label>
                        <input type="text" name="montoRestante">
                    </div>
                    
                    <div class="form-group">
                        <label>Cuota Diaria</label>
                        <input type="text" name="cuotaDiaria">
                    </div>
                </div>

                <!-- Firma Digital -->
                <div class="form-section signature-section">
                    <h3><i class="fas fa-signature"></i> Firma de Documentos</h3>
                    
                    <div class="signature-container">
                        <canvas id="signatureCanvas" width="400" height="200" class="signature-canvas"></canvas>
                        <div class="signature-controls">
                            <button type="button" class="btn-secondary" id="clearSignature">
                                <i class="fas fa-eraser"></i> Limpiar
                            </button>
                        </div>
                    </div>

                    
                </div>

                <!-- Acciones -->
                <div class="form-actions">
                    <button type="button" class="btn-primary" id="generarPDF">
                        <i class="fas fa-file-pdf"></i> Generar Recibooo
                    </button>
                    <button type="button" class="btn-whatsapp" id="enviarWhatsApp">
                        <i class="fab fa-whatsapp"></i> Enviar por WhatsApp
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="js/jspdf.umd.min.js"></script>
    <script src="js/sweetalert.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
